<form [formGroup]="userForm">
  <div class="flex gap-4 flex-wrap">
    <!-- User's First Name -->
    <app-text-input
      class="flex-1"
      label="First Name"
      ctrlId="formEditFirstName"
      placeholder="John"
      required
      [ctrl]="userForm.controls.firstName"></app-text-input>

    <!-- User's Last Name -->
    <app-text-input
      class="flex-1"
      label="Last Name"
      ctrlId="formEditLastName"
      placeholder="Doe"
      required
      [ctrl]="userForm.controls.lastName"></app-text-input>
  </div>

  <div class="flex gap-4 flex-wrap">
    <!-- User's Job Title -->
    <app-text-input
      class="flex-1"
      label="Job Title"
      ctrlId="formEditJobTitle"
      placeholder="Analyst"
      required
      [ctrl]="userForm.controls.jobTitle"></app-text-input>

    <!-- User's E-Mail -->
    <app-text-input
      class="flex-1"
      label="E-Mail"
      ctrlId="formEditEmail"
      placeholder="john.doe@my-org.com"
      required
      [ctrl]="userForm.controls.email"></app-text-input>

    <!-- User's PhoneNumber -->
    <app-text-input
      class="flex-1"
      label="Phone Number"
      ctrlId="formEditPhoneNumber"
      placeholder="+49 1234 567890"
      required
      [ctrl]="userForm.controls.phoneNumber"></app-text-input>
  </div>

  <div class="flex gap-4 flex-wrap">
    <!-- User's Password -->
    <app-password-input
      class="flex-1"
      label="Password"
      ctrlId="formEditPassword"
      [ctrl]="userForm.controls.password"></app-password-input>

    <app-password-repeat-input
      class="flex-1"
      label="Confirm Password"
      ctrlId="formEditConfirmPassword"
      [required]="userForm.controls.password.value.length"
      [ctrl]="userForm.controls.confirmPassword"
      [parentFormGroup]="userForm">
    </app-password-repeat-input>
  </div>
</form>
